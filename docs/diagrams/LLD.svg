<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5bffa8"/></marker>
    <marker id="b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/></marker>
    <marker id="c" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4d8fff"/></marker>
    <marker id="d" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#c084fc"/></marker>
  </defs>
  <rect width="1200" height="900" fill="#0d1117" rx="12"/>
  <rect x="1" y="1" width="1198" height="898" fill="none" stroke="#30363d" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="21" font-weight="bold" fill="#e2e8f8">⚙️ SMS Spam Detection — Low Level Design (LLD)</text>
  <text x="600" y="56" text-anchor="middle" font-size="11" fill="#8b949e">Module-level data flow · Alok Chauhan (251810700318) · Aman Kumar (251810700231) · Batch 2C</text>
  <line x1="50" y1="68" x2="1150" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- ═══ ROW 1: Input → Cleaning ═══ -->
  <!-- spam.csv -->
  <rect x="40" y="82" width="160" height="70" fill="#080d14" stroke="#64748b" stroke-width="1.5" rx="8"/>
  <text x="120" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#94a3b8">🗄️ spam.csv</text>
  <text x="120" y="126" text-anchor="middle" font-size="10" fill="#64748b">5,572 rows</text>
  <text x="120" y="141" text-anchor="middle" font-size="10" fill="#64748b">UCI Dataset</text>

  <!-- Arrow → NB1 -->
  <line x1="200" y1="117" x2="240" y2="117" stroke="#5bffa8" stroke-width="2" marker-end="url(#a)"/>
  <text x="218" y="110" text-anchor="middle" font-size="9" fill="#5bffa8">read</text>

  <!-- Notebook 1 -->
  <rect x="242" y="82" width="230" height="200" fill="#020c18" stroke="#38bdf8" stroke-width="1.5" rx="8"/>
  <text x="357" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#38bdf8">📓 01_data_cleaning</text>
  <line x1="252" y1="110" x2="462" y2="110" stroke="#1e3a4a" stroke-width="1"/>
  <text x="357" y="126" text-anchor="middle" font-size="10" fill="#7dd3fc">1. Load CSV (latin-1, cols 0,1)</text>
  <text x="357" y="142" text-anchor="middle" font-size="10" fill="#7dd3fc">2. Rename → label, message</text>
  <text x="357" y="158" text-anchor="middle" font-size="10" fill="#7dd3fc">3. Drop 403 duplicates</text>
  <text x="357" y="174" text-anchor="middle" font-size="10" fill="#7dd3fc">4. Extract char_count, word_count</text>
  <text x="357" y="190" text-anchor="middle" font-size="10" fill="#7dd3fc">5. Extract has_url, has_phone</text>
  <text x="357" y="206" text-anchor="middle" font-size="10" fill="#7dd3fc">6. Extract has_currency, has_free</text>
  <text x="357" y="222" text-anchor="middle" font-size="10" fill="#7dd3fc">7. spam_signals = sum(bools)</text>
  <text x="357" y="268" text-anchor="middle" font-size="10" fill="#7dd3fc">8. label_num = 1(spam) | 0(ham)</text>

  <!-- Arrow → spam_cleaned -->
  <line x1="472" y1="145" x2="514" y2="145" stroke="#5bffa8" stroke-width="2" marker-end="url(#a)"/>
  <text x="491" y="138" text-anchor="middle" font-size="9" fill="#5bffa8">writes</text>

  <!-- spam_cleaned.csv -->
  <rect x="516" y="82" width="180" height="126" fill="#080d14" stroke="#64748b" stroke-width="1.5" rx="8"/>
  <text x="606" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">🗄️ spam_cleaned.csv</text>
  <line x1="526" y1="110" x2="686" y2="110" stroke="#21262d" stroke-width="1"/>
  <text x="606" y="126" text-anchor="middle" font-size="10" fill="#64748b">5,169 rows · 12 cols</text>
  <text x="606" y="142" text-anchor="middle" font-size="10" fill="#64748b">label · message</text>
  <text x="606" y="158" text-anchor="middle" font-size="10" fill="#64748b">char_count · word_count</text>
  <text x="606" y="174" text-anchor="middle" font-size="10" fill="#64748b">has_* features (6 bools)</text>
  <text x="606" y="190" text-anchor="middle" font-size="10" fill="#64748b">spam_signals · label_num</text>

  <!-- Arrows FROM spam_cleaned → Train and EDA -->
  <line x1="696" y1="117" x2="738" y2="85" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="696" y1="145" x2="738" y2="165" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="696" y1="183" x2="738" y2="250" stroke="#c084fc" stroke-width="1.5" marker-end="url(#d)"/>

  <!-- ═══ train_model.py ═══ -->
  <rect x="740" y="62" width="410" height="200" fill="#120f02" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="945" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">🐍 train_model.py</text>
  <line x1="750" y1="90" x2="1140" y2="90" stroke="#2a2200" stroke-width="1"/>
  <text x="945" y="108" text-anchor="middle" font-size="10" fill="#fcd34d">1. Train/Test Split (80/20 stratified)</text>
  <text x="945" y="126" text-anchor="middle" font-size="10" fill="#fcd34d">2. Build 4 Pipelines (each own TfidfVectorizer)</text>
  <text x="945" y="144" text-anchor="middle" font-size="10" fill="#fcd34d">3. Fit: NaiveBayes · LogReg · LinearSVM · DTree</text>
  <text x="945" y="162" text-anchor="middle" font-size="10" fill="#fcd34d">4. Evaluate: Acc · Prec · Recall · F1 · ROC-AUC</text>
  <text x="945" y="180" text-anchor="middle" font-size="10" fill="#fcd34d">5. 5-Fold Cross-Validation (cv_f1)</text>
  <text x="945" y="198" text-anchor="middle" font-size="10" fill="#fcd34d">6. Best model → joblib.dump(spam_model.pkl)</text>
  <text x="945" y="216" text-anchor="middle" font-size="10" fill="#fcd34d">7. json.dump(ml_results.json)</text>
  <text x="945" y="250" text-anchor="middle" font-size="10" fill="#fcd34d">TF-IDF: max_features=6000, ngram=(1,2), sublinear_tf=True</text>

  <!-- Artifacts row -->
  <line x1="945" y1="262" x2="945" y2="310" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#b)"/>

  <rect x="740" y="312" width="190" height="60" fill="#080d14" stroke="#f59e0b" stroke-width="1" rx="6"/>
  <text x="835" y="337" text-anchor="middle" font-size="12" fill="#f59e0b">🧠 spam_model.pkl</text>
  <text x="835" y="357" text-anchor="middle" font-size="10" fill="#fcd34d">LinearSVM · F1=95.86%</text>
  <rect x="960" y="312" width="190" height="60" fill="#080d14" stroke="#f59e0b" stroke-width="1" rx="6"/>
  <text x="1055" y="337" text-anchor="middle" font-size="12" fill="#f59e0b">📊 ml_results.json</text>
  <text x="1055" y="357" text-anchor="middle" font-size="10" fill="#fcd34d">4 models · ROC · CV-F1</text>

  <!-- ═══ EDA Notebooks ═══ -->
  <rect x="740" y="148" width="190" height="80" fill="#020c18" stroke="#38bdf8" stroke-width="1" rx="6"/>
  <text x="835" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#38bdf8">📓 02_eda_distribution</text>
  <text x="835" y="188" text-anchor="middle" font-size="10" fill="#7dd3fc">Pie · Histograms · Bars</text>
  <text x="835" y="204" text-anchor="middle" font-size="10" fill="#7dd3fc">save_charts.py → PNG output</text>

  <!-- ═══ Text / Segmentation Notebooks ═══ -->
  <rect x="740" y="232" width="190" height="68" fill="#120d1e" stroke="#c084fc" stroke-width="1" rx="6"/>
  <text x="835" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#c084fc">📓 03 · 04</text>
  <text x="835" y="270" text-anchor="middle" font-size="10" fill="#d8b4fe">Word Freq · N-grams</text>
  <text x="835" y="286" text-anchor="middle" font-size="10" fill="#d8b4fe">Segmentation · Rules</text>

  <!-- ═══ ROW 2: Dashboard ═══ -->
  <rect x="40" y="410" width="540" height="210" fill="#120d1e" stroke="#c084fc" stroke-width="1.5" rx="8"/>
  <text x="310" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#c084fc">📊 05_dashboard.py — Streamlit Dashboard</text>
  <line x1="50" y1="438" x2="570" y2="438" stroke="#1e0d30" stroke-width="1"/>
  <!-- Functions -->
  <rect x="56" y="446" width="235" height="44" fill="#0a0614" stroke="#7c3aed" stroke-width="1" rx="4"/>
  <text x="173" y="463" text-anchor="middle" font-size="10" font-weight="bold" fill="#a855f7">Data Loaders (@cache)</text>
  <text x="173" y="479" text-anchor="middle" font-size="9" fill="#c4b5fd">load_data() · load_ml_results() · load_model()</text>
  <rect x="306" y="446" width="235" height="44" fill="#0a0614" stroke="#7c3aed" stroke-width="1" rx="4"/>
  <text x="423" y="463" text-anchor="middle" font-size="10" font-weight="bold" fill="#a855f7">Signal Engine</text>
  <text x="423" y="479" text-anchor="middle" font-size="9" fill="#c4b5fd">check_signals(msg) → 9 rules</text>
  <!-- Pages -->
  <text x="60" y="510" font-size="10" font-weight="bold" fill="#d8b4fe">Pages:</text>
  <rect x="56" y="518" width="88" height="32" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="100" y="537" text-anchor="middle" font-size="9" fill="#c4b5fd">🏠 Overview</text>
  <rect x="152" y="518" width="88" height="32" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="196" y="537" text-anchor="middle" font-size="9" fill="#c4b5fd">📊 EDA</text>
  <rect x="248" y="518" width="88" height="32" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="292" y="537" text-anchor="middle" font-size="9" fill="#c4b5fd">🔤 Words</text>
  <rect x="344" y="518" width="88" height="32" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="388" y="537" text-anchor="middle" font-size="9" fill="#c4b5fd">📏 Segments</text>
  <rect x="440" y="518" width="88" height="32" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="484" y="537" text-anchor="middle" font-size="9" fill="#c4b5fd">🤖 ML Results</text>
  <!-- Verdict flow -->
  <text x="56" y="572" font-size="10" font-weight="bold" fill="#d8b4fe">Check Message flow:</text>
  <rect x="56" y="580" width="120" height="30" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="116" y="599" text-anchor="middle" font-size="9" fill="#c4b5fd">User Input</text>
  <line x1="176" y1="595" x2="196" y2="595" stroke="#c084fc" stroke-width="1.5" marker-end="url(#d)"/>
  <rect x="198" y="580" width="130" height="30" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="263" y="599" text-anchor="middle" font-size="9" fill="#c4b5fd">ML predict_proba()</text>
  <line x1="328" y1="595" x2="348" y2="595" stroke="#c084fc" stroke-width="1.5" marker-end="url(#d)"/>
  <rect x="350" y="580" width="170" height="30" fill="#0a0614" stroke="#6d28d9" rx="3"/>
  <text x="435" y="599" text-anchor="middle" font-size="9" fill="#c4b5fd">SPAM / LIKELY / SAFE</text>

  <!-- Arrows into dashboard -->
  <line x1="606" y1="145" x2="606" y2="480" stroke="#64748b" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="606" y1="480" x2="580" y2="480" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="835" y1="372" x2="310" y2="412" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#b)"/>

  <!-- ═══ ROW 2: Web App + Function ═══ -->
  <rect x="620" y="410" width="530" height="210" fill="#0a1a2e" stroke="#4d8fff" stroke-width="1.5" rx="8"/>
  <text x="885" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#4d8fff">🌐 index.html + ⚡ predict.js</text>
  <line x1="630" y1="438" x2="1140" y2="438" stroke="#0a1a2e" stroke-width="1"/>
  <!-- index.html functions -->
  <text x="640" y="456" font-size="10" font-weight="bold" fill="#7eb8ff">index.html JS functions:</text>
  <text x="640" y="474" font-size="9" fill="#93c5fd">onInput() · setExample() · analyse() · showResult()</text>
  <text x="640" y="490" font-size="9" fill="#93c5fd">demoPredict() · apiPredict() · addToHistory() · renderHistory()</text>
  <!-- API probe -->
  <rect x="630" y="500" width="510" height="36" fill="#05111f" stroke="#1e40af" rx="4"/>
  <text x="885" y="515" text-anchor="middle" font-size="10" fill="#7eb8ff">Page Load → fetch(/.netlify/functions/predict) health probe</text>
  <text x="885" y="529" text-anchor="middle" font-size="9" fill="#60a5fa">200/400 response → USE_DEMO=false (live)   Network error → USE_DEMO=true (demo)</text>
  <!-- Analyse flow -->
  <text x="640" y="556" font-size="10" font-weight="bold" fill="#7eb8ff">Prediction flow:</text>
  <rect x="630" y="564" width="100" height="30" fill="#05111f" stroke="#1e40af" rx="3"/>
  <text x="680" y="583" text-anchor="middle" font-size="9" fill="#93c5fd">User types</text>
  <line x1="730" y1="579" x2="750" y2="579" stroke="#4d8fff" stroke-width="1.5" marker-end="url(#c)"/>
  <rect x="752" y="564" width="110" height="30" fill="#05111f" stroke="#1e40af" rx="3"/>
  <text x="807" y="583" text-anchor="middle" font-size="9" fill="#93c5fd">POST /predict</text>
  <line x1="862" y1="579" x2="882" y2="579" stroke="#4d8fff" stroke-width="1.5" marker-end="url(#c)"/>
  <rect x="884" y="564" width="110" height="30" fill="#05111f" stroke="#1e40af" rx="3"/>
  <text x="939" y="576" text-anchor="middle" font-size="9" fill="#93c5fd">8 SPAM_PATTERNS</text>
  <text x="939" y="590" text-anchor="middle" font-size="9" fill="#93c5fd">score → prob</text>
  <line x1="994" y1="579" x2="1014" y2="579" stroke="#4d8fff" stroke-width="1.5" marker-end="url(#c)"/>
  <rect x="1016" y="564" width="118" height="30" fill="#05111f" stroke="#1e40af" rx="3"/>
  <text x="1075" y="576" text-anchor="middle" font-size="9" fill="#5bffa8">is_spam</text>
  <text x="1075" y="590" text-anchor="middle" font-size="9" fill="#5bffa8">confidence</text>

  <!-- ═══ Error Handling Row ═══ -->
  <rect x="40" y="640" width="1120" height="100" fill="#0d1117" stroke="#ef4444" stroke-width="1.5" rx="8" stroke-dasharray="8,4"/>
  <text x="600" y="660" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef4444">🛡️ Error Handling Strategy</text>
  <text x="110" y="682" text-anchor="middle" font-size="10" fill="#fca5a5">load_data()</text>
  <text x="110" y="698" text-anchor="middle" font-size="9" fill="#94a3b8">None → st.error+stop</text>
  <text x="260" y="682" text-anchor="middle" font-size="10" fill="#fca5a5">load_model()</text>
  <text x="260" y="698" text-anchor="middle" font-size="9" fill="#94a3b8">not_found → rules fallback</text>
  <text x="430" y="682" text-anchor="middle" font-size="10" fill="#fca5a5">train_model.py</text>
  <text x="430" y="698" text-anchor="middle" font-size="9" fill="#94a3b8">spam.csv check → FileNotFoundError</text>
  <text x="610" y="682" text-anchor="middle" font-size="10" fill="#fca5a5">boxplot labels</text>
  <text x="610" y="698" text-anchor="middle" font-size="9" fill="#94a3b8">mpl≥3.9 tick_labels else labels=</text>
  <text x="790" y="682" text-anchor="middle" font-size="10" fill="#fca5a5">apiPredict()</text>
  <text x="790" y="698" text-anchor="middle" font-size="9" fill="#94a3b8">catch → demoPredict fallback</text>
  <text x="980" y="682" text-anchor="middle" font-size="10" fill="#fca5a5">predict.js</text>
  <text x="980" y="698" text-anchor="middle" font-size="9" fill="#94a3b8">len&lt;1 → 400 · len&gt;10k → 400</text>
  <text x="1120" y="698" font-size="9" fill="#30363d">LLD 2026</text>

  <!-- Vertical separators in error row -->
  <line x1="180" y1="668" x2="180" y2="728" stroke="#30363d" stroke-width="1"/>
  <line x1="350" y1="668" x2="350" y2="728" stroke="#30363d" stroke-width="1"/>
  <line x1="520" y1="668" x2="520" y2="728" stroke="#30363d" stroke-width="1"/>
  <line x1="700" y1="668" x2="700" y2="728" stroke="#30363d" stroke-width="1"/>
  <line x1="880" y1="668" x2="880" y2="728" stroke="#30363d" stroke-width="1"/>
  <line x1="1060" y1="668" x2="1060" y2="728" stroke="#30363d" stroke-width="1"/>

  <!-- Footer -->
  <text x="600" y="760" text-anchor="middle" font-size="10" fill="#30363d">SMS Spam Data Exploration · Low Level Design · 2026</text>
</svg>
