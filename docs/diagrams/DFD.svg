  <text x="600" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#e2e8f8">⚙️ SMS Spam</text>
  <text x="600" y="160" text-anchor="middle" font-size="16" font-weight="bold" fill="#e2e8f8">Detection System</text>
  <text x="600" y="182" text-anchor="middle" font-size="10" fill="#8b949e">train_model.py · 05_dashboard.py</text>
  <text x="600" y="198" text-anchor="middle" font-size="10" fill="#8b949e">index.html · predict.js</text>
  <text x="600" y="214" text-anchor="middle" font-size="10" fill="#8b949e">Notebooks 01–04 · save_charts.py</text>

