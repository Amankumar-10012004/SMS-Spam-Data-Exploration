    <marker id="gb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4d8fff"/></marker>
    <marker id="gc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/></marker>
    <marker id="gd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#c084fc"/></marker>
    <marker id="ge" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="860" fill="#0d1117" rx="12"/>
  <rect x="1" y="1" width="1198" height="858" fill="none" stroke="#30363d" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="21" font-weight="bold" fill="#e2e8f8">🔁 SMS Spam Detection — Data Flow Diagram (DFD)</text>
  <text x="600" y="56" text-anchor="middle" font-size="11" fill="#8b949e">Level-0 Context + Level-1 Process Decomposition · Alok Chauhan · Aman Kumar · Batch 2C</text>
  <line x1="50" y1="66" x2="1150" y2="66" stroke="#30363d" stroke-width="1"/>

  <!-- ──────────────── LEVEL 0 CONTEXT DIAGRAM ──────────────── -->
