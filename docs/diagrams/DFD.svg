  <text x="1070" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#4d8fff">🎓 Reviewer</text>
  <text x="1070" y="164" text-anchor="middle" font-size="10" fill="#7eb8ff">Developer</text>

